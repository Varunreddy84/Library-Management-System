{% extends "base.html" %}
{% block title %}{{ action }} Author — LibraryMS{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
    <div class="d-flex align-items-center mb-4">
        <a href="{{ url_for('authors.index') }}" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h1 class="h2 fw-bold mb-0">{{ action }} Author</h1>
    </div>
    <div class="card border-0 shadow-sm"><div class="card-body p-4">
        <form method="POST">
            <div class="mb-3"><label class="form-label fw-semibold">First Name *</label>
                <input type="text" name="first_name" class="form-control" value="{{ form_data.first_name if form_data else '' }}" required></div>
            <div class="mb-3"><label class="form-label fw-semibold">Last Name *</label>
                <input type="text" name="last_name" class="form-control" value="{{ form_data.last_name if form_data else '' }}" required></div>
            <div class="mb-3"><label class="form-label fw-semibold">Nationality</label>
                <input type="text" name="nationality" class="form-control" value="{{ form_data.nationality if form_data else '' }}"></div>
            <div class="mb-4"><label class="form-label fw-semibold">Birth Year</label>
                <input type="number" name="birth_year" class="form-control" min="0" max="2025" value="{{ form_data.birth_year if form_data else '' }}"></div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-1"></i>{{ action }} Author</button>
                <a href="{{ url_for('authors.index') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div></div>
</div></div>
{% endblock %}
